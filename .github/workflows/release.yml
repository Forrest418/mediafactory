name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore .\MediaFactory.slnx

      - name: Publish self-contained app
        run: >
          dotnet publish .\MediaFactory.App\MediaFactory.App.vbproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o .\artifacts\publish\win-x64

      - name: Prepare release files
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts\publish\win-x64'
          $releaseRoot = Join-Path $env:GITHUB_WORKSPACE 'artifacts\release'
          $packageDir = Join-Path $releaseRoot 'MediaFactory-win-x64'
          $templateConfig = Join-Path $env:GITHUB_WORKSPACE 'ModelProviders.json'
          $zipPath = Join-Path $releaseRoot 'MediaFactory-win-x64.zip'
          $standaloneExePath = Join-Path $releaseRoot 'MediaFactory-win-x64.exe'

          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null
          Copy-Item (Join-Path $publishDir '*') $packageDir -Recurse -Force
          Copy-Item $templateConfig (Join-Path $packageDir 'ModelProviders.json') -Force

          $exe = Get-ChildItem $packageDir -Filter '*.exe' | Select-Object -First 1
          if ($null -eq $exe) {
            throw 'No executable was produced in the publish output.'
          }

          if ($exe.Name -ne 'MediaFactory.exe') {
            Rename-Item $exe.FullName 'MediaFactory.exe'
          }

          if (Test-Path $standaloneExePath) {
            Remove-Item $standaloneExePath -Force
          }

          Copy-Item (Join-Path $packageDir 'MediaFactory.exe') $standaloneExePath -Force

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $packageDir '*') -DestinationPath $zipPath -Force

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MediaFactory-win-x64
          path: |
            .\artifacts\release\MediaFactory-win-x64.exe
            .\artifacts\release\MediaFactory-win-x64.zip

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .\artifacts\release\MediaFactory-win-x64.exe
            .\artifacts\release\MediaFactory-win-x64.zip
          generate_release_notes: true
